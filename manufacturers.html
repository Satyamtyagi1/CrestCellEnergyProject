<style>
     :root{
    --navy:#12213A;
    --navy-2:#1B2F52;
    --gold:#F2A93B;
    --gold-deep:#D98A1E;
    --ember:#E4622F;
    --cream:#FBF6EC;
    --paper:#FFFFFF;
    --ink:#1C2333;
    --slate:#5B6478;
    --leaf:#3F8F5F;
    --line:#E4DCC9;
    --line-dark:rgba(255,255,255,0.14);
    --font-display:'Fraunces', serif;
    --font-body:'IBM Plex Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --radius:14px;
    --shadow: 0 20px 40px -24px rgba(18,33,58,0.35);
  }
   *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--navy);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
  img,svg{display:block;max-width:100%;}
  a{color:inherit;}
  h1,h2,h3,h4{
    font-family:var(--font-display);
    font-weight:700;
    line-height:1.08;
    margin:0 0 .5em;
    letter-spacing:-0.01em;
  }

  header{
    position:sticky;top:0;z-index:60;
    background:rgba(251,246,236,.97);
    border-bottom:1px solid var(--line);
  }
  .nav-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;max-width:1180px;margin:0 auto;
  }
  .logo{
    display:flex;align-items:center;gap:10px;
    font-family:var(--font-display);font-weight:700;font-size:1.28rem;
    color:var(--navy);text-decoration:none;
  }
  .logo small{
    display:block;font-family:var(--font-mono);font-weight:500;
    font-size:.58rem;letter-spacing:.16em;color:var(--slate);text-transform:uppercase;
  }
  .logo-circle{
    width:60px;height:60px;border-radius:50%;background:var(--navy);
    display:flex;align-items:center;justify-content:center;flex:none;
    border:2px solid var(--gold);overflow:hidden;
  }
  .logo-circle img{width:100%;height:100%;object-fit:cover;}
  nav.main-nav{display:flex;align-items:center;gap:30px;}
  nav.main-nav a{
    font-size:.92rem;font-weight:500;text-decoration:none;color:var(--navy);
    position:relative;padding:4px 0;
  }
  nav.main-nav a::after{
    content:"";position:absolute;left:0;bottom:-2px;height:2px;width:0;
    background:var(--ember);transition:width .2s ease;
  }
  nav.main-nav a:hover::after, nav.main-nav a.active::after{width:100%;}
  nav.main-nav a.active{color:var(--ember);}
  .nav-cta{display:flex;align-items:center;gap:14px;}
  .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;}
  .hamburger span{width:24px;height:2px;background:var(--navy);display:block;}
  .btn{
    display:inline-flex;align-items:center;gap:.55em;font-weight:600;font-size:.95rem;
    padding:11px 20px;border-radius:999px;border:1px solid var(--navy);
    cursor:pointer;text-decoration:none;color:var(--navy);background:transparent;
    transition:background .18s ease,color .18s ease;white-space:nowrap;
  }
  .btn:hover{background:var(--navy);color:#fff;}

  @media(max-width:920px){
    nav.main-nav{
      position:fixed;top:65px;left:0;right:0;bottom:0;height:calc(100vh - 65px);
      z-index:59;background:var(--cream);
      flex-direction:column;align-items:flex-start;padding:28px;gap:22px;
      transform:translateX(100%);transition:transform .3s ease;
      border-top:1px solid var(--line);overflow-y:auto;
      box-shadow:-8px 0 24px -12px rgba(18,33,58,.25);
    }
    nav.main-nav.open{transform:translateX(0);}
    nav.main-nav a{font-size:1.1rem;width:100%;}
    .hamburger{display:flex;}
    .nav-cta .btn{display:none;}
  }

   


  p{margin:0 0 1em;}
  .eyebrow{
    font-family:var(--font-mono);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:.72rem;
    font-weight:600;
    color:var(--ember);
    display:inline-flex;
    align-items:center;
    gap:.5em;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:1px;
    background:var(--ember);
    display:inline-block;
  }
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:0 28px;
  }
  section{padding:96px 0;position:relative;}
  @media(max-width:720px){ section{padding:64px 0;} .wrap{padding:0 20px;} }
.partners{
  background:var(--cream);
  padding:80px 0;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  flex:1 0 auto;
}

.partners-title{
  text-align:center;
  color:var(--navy);
  font-size:clamp(1.5rem,2.6vw,2rem);
  margin-bottom:50px;
}

.partners-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
  row-gap:40px;
  column-gap:0;
}

.partner-logo{
  flex:0 0 33.333%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:0 24px;
  gap:12px;
}

  max-height:48px;

  opacity:.75;

}

.partner-logo img:hover{

  opacity:1;

} */

.partner-logo img{
  max-height:72px;
  width:auto;
  max-width:150%;
  object-fit:contain;
  transition:transform .25s ease;
}

.partner-logo img:hover{
  transform:translateY(-4px);
}

.partner-name{
  font-family:var(--font-mono);
  font-size:.78rem;
  font-weight:500;
  letter-spacing:.04em;
  color:var(--slate);
  text-align:center;
  text-transform:uppercase;
}

@media(max-width:820px){
  .partner-logo{
    flex:0 0 50%;
    padding:0 16px;
  }
}

@media(max-width:480px){
  .partner-logo{
    flex:0 0 100%;
  }

  .partners-grid{
    row-gap:32px;
  }
}
  footer{background:#0D1729;color:#AEB9D1;padding:50px 0;text-align:center;}
  footer p{margin:0;font-size:.85rem;}
  footer a{color:var(--gold);text-decoration:none;}
  footer a:hover{text-decoration:underline;}

  /* ---------- Floating buttons ---------- */
  .wa-float{
    position:fixed;right:22px;bottom:22px;z-index:70;
    width:56px;height:56px;border-radius:50%;background:var(--leaf);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 26px -8px rgba(63,143,95,.7);text-decoration:none;
  }
  .wa-float svg{width:26px;height:26px;stroke:#fff;fill:none;}
  .directions-float{
    position:fixed;right:22px;bottom:90px;z-index:70;
    width:56px;height:56px;border-radius:50%;background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 26px -8px rgba(242,169,59,.7);text-decoration:none;
  }
  .directions-float svg{width:26px;height:26px;stroke:var(--navy);fill:none;}


</style>
</head>

<script>
  // mobile nav toggle
  const hamburger = document.getElementById('hamburgerBtn');
  const mainNav = document.getElementById('mainNav');
  hamburger.addEventListener('click', () => {
    const isOpen = mainNav.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', isOpen);
  });
  mainNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    mainNav.classList.remove('open');
    hamburger.setAttribute('aria-expanded', false);
  }));
</script>
